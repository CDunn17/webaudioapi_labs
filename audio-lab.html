<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="/src/audio-lab.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Audio API Lab</title>
  </head>
  <body>
    <main class="audio-lab">
      <header class="app-header">
        <div>
          <h1>Audio Lab</h1>
          <p>Tune layered Web Audio effects from editable local presets.</p>
        </div>
        <div class="header-actions">
          <a class="secondary-button header-link" href="/?guide=1">How it works</a>
          <a
            class="secondary-button header-link"
            href="__SOURCE_CODE_URL__"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Source code on GitHub (opens in a new tab)"
            >Source code</a
          >
          <button class="primary-button" id="play-toggle-button" type="button">Play</button>
          <label class="loop-control" id="loop-control">
            <input id="loop-checkbox" type="checkbox" />
            <span>Loop</span>
          </label>
        </div>
      </header>

      <section class="workspace">
        <aside class="sound-list-panel" aria-label="Sound effects">
          <label class="select-field" for="sound-select">
            <span>Sound Effect</span>
            <select id="sound-select"></select>
          </label>
          <div class="sound-list" id="sound-list"></div>
        </aside>

        <section class="editor-panel" aria-labelledby="editor-title">
          <div class="editor-heading">
            <div>
              <h2 id="editor-title">Sound</h2>
              <p id="editor-summary"></p>
            </div>
            <span class="sound-kind" id="sound-kind"></span>
          </div>

          <div class="transport-row">
            <label class="field compact-field" for="master-volume">
              <span>Master Volume</span>
              <input id="master-volume" type="range" min="0" max="1" step="0.01" />
            </label>
            <button class="secondary-button" id="reset-button" type="button">Reset</button>
            <button class="secondary-button" id="copy-button" type="button">Copy Config</button>
          </div>

          <div class="parameter-grid" id="parameter-grid"></div>
          <output class="copy-status" id="copy-status" aria-live="polite"></output>
        </section>

        <aside class="reference-panel" aria-labelledby="reference-title">
          <h2 id="reference-title">Web Audio Notes</h2>
          <div class="reference-list" id="reference-list"></div>
        </aside>
      </section>
    </main>

    <script type="module" src="/src/audioLab.ts"></script>
  </body>
</html>
